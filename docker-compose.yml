services:
  front-cliente:
    build: ./front-cliente
    ports:
      - "5173:3000"
    environment:
      - PUBLIC_API_URL=http://back:3000
    depends_on:
      - back

  front-empresa:
    build: ./front-empresa
    ports:
      - "5174:3000"
    environment:
      - PUBLIC_API_URL=http://back:3000
    depends_on:
      - back

  back:
    build: ./back
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=i2h
      - DB_USER=postgres
      - DB_PASSWORD=postgres
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=i2h
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./back/src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
